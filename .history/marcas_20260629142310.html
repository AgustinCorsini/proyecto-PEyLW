<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZone Store</title>
    <link rel="stylesheet" href="style.css">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <!-- Contenedor del menú hamburguesa y el logo -->
        <div class="header-izquierda">

            <!-- Botón que más adelante abrirá el menú lateral con JavaScript -->
            <button type="button" class="menu-hamburguesa" aria-label="Abrir menú">

                <!-- Icono obtenido desde Font Awesome -->
                <i class="fa-solid fa-bars" aria-hidden="true"></i>

            </button>

            <!-- Logo que redirige al inicio -->
            <div class="logo">
                <a href="main.html">
                    <img src="logo.png" alt="GameZone Store">
                </a>
            </div>

        </div>

    <nav>

        <a href="main.html" class="nav-link">Inicio</a>

        <a href="productos.html" class="nav-link">Productos</a>

        <div class="dropdown">

            <a href="#catPrincipales" class="dropdown-btn nav-link">
                Categorías
                <i class="fa-solid fa-chevron-down"></i>
            </a>

            <!-- Contenedor del menú desplegable -->
            <div class="dropdown-menu">

                <a href="/pagsProductos/auriculares.html">
                    <img src="./iconos/headset-svgrepo-com.svg" alt="">
                    Auriculares
                </a>

                <a href="/pagsProductos/teclados.html">
                    <img src="./iconos/keyboard-svgrepo-com.svg" alt="">
                    Teclados
                </a>

                <a href="/pagsProductos/mouses.html">
                    <img src="./iconos/mouse-gaming-svgrepo-com.svg" alt="">
                    Mouses
                </a>

                <a href="/pagsProductos/monitores.html">
                    <img src="./iconos/monitor-svgrepo-com.svg" alt="">
                    Monitores
                </a>

                <a href="/pagsProductos/sillas.html">
                    <img src="./iconos/office-chair-chair-svgrepo-com.svg" alt="Silla">
                    Sillas
                </a>

                <a href="/pagsProductos/accesorios.html">
                    <img src="./iconos/gamepad-joystick-svgrepo-com.svg" alt="">
                    Accesorios
                </a>

            </div>

        </div>

        <a href="#" class="nav-link active">Ofertas</a>

        <a href="#" class="nav-link">Marcas</a>


    </nav>

        <div class="acciones">
            <input type="text" id="buscador">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-solid fa-cart-shopping"></i>
        </div>

    </header>

    <!-- CATEGORIAS -->
    <section class="categorias">
        <!-- id utilizado como ancla para desplazarse desde el navbar -->
        <h2 id="catPrincipales">Categorías principales</h2>

        <div class="contenedor-categorias">

            <a href="./pagsProductos/auriculares.html" class="categoria">
                <img src="./iconos/headset-svgrepo-com.svg" alt="Auriculares">
                <span>Auriculares</span>
            </a>

            <a href="./pagsProductos/teclados.html" class="categoria">
                <img src="./iconos/keyboard-svgrepo-com.svg" alt="Teclados">
                <span>Teclados</span>
            </a>

            <a href="/pagsProductos/mouses.html" class="categoria">
                <img src="./iconos/mouse-gaming-svgrepo-com.svg" alt="Mouses">
                <span>Mouses</span>
            </a>

            <a href="/pagsProductos/monitores.html" class="categoria">
                <img src="./iconos/monitor-svgrepo-com.svg" alt="Monitores">
                <span>Monitores</span>
            </a>

            <a href="/pagsProductos/sillas.html" class="categoria">
                <img src="./iconos/office-chair-chair-svgrepo-com.svg" alt="Silla">
                <span>Sillas</span>
            </a>

            <a href="/pagsProductos/accesorios.html" class="categoria">
                <img src="./iconos/gamepad-joystick-svgrepo-com.svg" alt="Accesorios">
                <span>Accesorios</span>
            </a>

        </div>

    </section>


    <!-- FOOTER -->
    <footer>
        <p>© 2026 GameZone Store</p>
    </footer>

</body>
</html>
