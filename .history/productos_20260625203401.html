<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="logo">
            <a  href="main.html">
                <img src="logo.png" alt="GameZone Store">
            </a>
        </div>

        <nav>
            <a href="main.html">Inicio</a>
            <a href="productos.html">Productos</a>
            <a href="#">Categorías</a>
            <a href="#">Ofertas</a>
            <a href="#">Nosotros</a>
            <a href="#">Contacto</a>
        </nav>

        <div class="acciones">
            <input type="text" id="buscador"><i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-user"></i>
            <i class="fa-solid fa-cart-shopping"></i>
        </div>
    </header>


        <!-- PRODUCTOS -->
    <section class="productos">

        <h2>Productos Destacados</h2>

        <div class="grid-productos">

            <div class="card">
                <img src="./auris/HXC2.webp" alt="">
                <h3>HyperX Cloud II</h3>
                <span>$89.999</span>
                <button type="button">Agregar</button>
            </div>

            <div class="card">
                <img src="./teclados/tecladok552.webp" alt="">
                <h3>Redragon K552</h3>
                <span>$59.999</span>
                <button type="button">Agregar</button>
            </div>

            <div class="card">
                <img src="/mouses/g502.webp" alt="">
                <h3>Logitech G502</h3>
                <span>$69.999</span>
                <button type="button">Agregar</button>
            </div>

            <div class="card">
                <img src="/monitores/xiami-G34WQi.webp" alt="">
                <h3>Monitor Xiaomi G34WQi </h3>
                <span>$399.999</span>
                <button type="button">Agregar</button>
            </div>

            <div class="card">
                <img src="/sillas/Gc-907.webp" alt="">
                <h3>Silla Gamer Xtrike-me Gc-907 RGB</h3>
                <span>$434000</span>
                <button type="button">Agregar</button>
            </div>

        </div>

    </section>
</body>
</html>
